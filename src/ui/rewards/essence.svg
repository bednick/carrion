<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- ореол свечения -->
  <ellipse cx="32" cy="34" rx="20" ry="24" fill="#1fb6d8" opacity="0.18"/>
  <!-- кристалл: грани -->
  <polygon points="32,6 46,26 32,58 18,26" fill="#2bd0e8" stroke="#8ff0ff" stroke-width="1.5"/>
  <!-- левая тёмная грань -->
  <polygon points="32,6 18,26 32,58" fill="#1794b8" opacity="0.85"/>
  <!-- верхняя фаска -->
  <polygon points="32,6 46,26 32,26 18,26" fill="#7fe6ff" opacity="0.9"/>
  <!-- центральное свечение -->
  <polygon points="32,26 40,30 32,50 24,30" fill="#bff6ff" opacity="0.55"/>
  <!-- рёбра -->
  <line x1="32" y1="6" x2="32" y2="58" stroke="#eafcff" stroke-width="1" opacity="0.7"/>
  <line x1="18" y1="26" x2="46" y2="26" stroke="#eafcff" stroke-width="1" opacity="0.5"/>
  <!-- искры -->
  <circle cx="43" cy="16" r="1.6" fill="#eafcff"/>
  <circle cx="22" cy="44" r="1.3" fill="#eafcff" opacity="0.8"/>
</svg>
