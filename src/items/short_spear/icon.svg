<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <rect width="40" height="40" rx="4" fill="#2a1808"/>
  <!-- древко -->
  <line x1="8" y1="34" x2="28" y2="14" stroke="#9a6228" stroke-width="4" stroke-linecap="round"/>
  <!-- блик дерева -->
  <line x1="9" y1="32" x2="26" y2="15" stroke="#c88a40" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <!-- обмотка рукояти -->
  <line x1="10" y1="33" x2="15" y2="28" stroke="#4a1e08" stroke-width="4" stroke-linecap="butt"/>
  <!-- наконечник копья -->
  <polygon points="26,16 32,7 35,10 27,19" fill="#8a929c" stroke="#c4ccd6" stroke-width="0.5"/>
  <line x1="28" y1="17" x2="31" y2="12" stroke="#dfe4ea" stroke-width="0.8" opacity="0.6"/>
</svg>
