<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <rect width="40" height="40" rx="4" fill="#0e200e"/>
  <!-- левая поножа -->
  <rect x="5" y="7" width="13" height="28" rx="3" fill="#8b5e2a" stroke="#b07840" stroke-width="1"/>
  <!-- правая поножа -->
  <rect x="22" y="7" width="13" height="28" rx="3" fill="#8b5e2a" stroke="#b07840" stroke-width="1"/>
  <!-- наколенник левый -->
  <ellipse cx="11.5" cy="20" rx="6" ry="5" fill="#a07840" stroke="#c09850" stroke-width="1"/>
  <!-- наколенник правый -->
  <ellipse cx="28.5" cy="20" rx="6" ry="5" fill="#a07840" stroke="#c09850" stroke-width="1"/>
  <!-- ремни левые -->
  <rect x="3" y="11" width="17" height="2" rx="1" fill="#4a2808"/>
  <rect x="3" y="29" width="17" height="2" rx="1" fill="#4a2808"/>
  <!-- ремни правые -->
  <rect x="20" y="11" width="17" height="2" rx="1" fill="#4a2808"/>
  <rect x="20" y="29" width="17" height="2" rx="1" fill="#4a2808"/>
</svg>
