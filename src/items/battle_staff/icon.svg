<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <rect width="40" height="40" rx="4" fill="#2a1808"/>
  <!-- цельное древко посоха -->
  <line x1="7" y1="34" x2="33" y2="6" stroke="#a06830" stroke-width="5" stroke-linecap="round"/>
  <!-- блик дерева -->
  <line x1="9" y1="31" x2="31" y2="9" stroke="#d4a060" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- нижняя оковка -->
  <line x1="8" y1="33" x2="13" y2="28" stroke="#8a8f98" stroke-width="5" stroke-linecap="butt"/>
  <!-- верхняя оковка -->
  <line x1="27" y1="13" x2="32" y2="8" stroke="#8a8f98" stroke-width="5" stroke-linecap="butt"/>
  <circle cx="32" cy="7" r="2.4" fill="#b8bec8" stroke="#dfe4ea" stroke-width="0.5"/>
</svg>
